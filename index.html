<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XXX</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
      background: #f3ecff;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -80px;
      background:
        radial-gradient(circle at 10% 20%, #ffd1dc 0, transparent 55%),
        radial-gradient(circle at 90% 10%, #a18cff 0, transparent 55%),
        radial-gradient(circle at 20% 80%, #ffebb8 0, transparent 55%),
        radial-gradient(circle at 80% 80%, #ffb3ff 0, transparent 55%);
      filter: blur(30px);
      z-index: -1;
    }

    .page-wrapper {
      width: 100%;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-card {
      width: min(1120px, 100%);
      height: 520px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 32px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    // ana panel
    <div class="hero-card"></div>
  </div>
</body>
</html>
