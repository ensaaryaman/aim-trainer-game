<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, #ff3b2f, #7a0000);
      overflow: hidden;
      padding: 40px; /* panel ile dış çerçeve arası boşluk */
    }

    /* Ön taraftaki siyah camsı panel */
    .glass-panel {
      width: 100%;
      height: 85vh; /* attığın örnekteki gibi daha içeride */
      border-radius: 14px;

      /* Camsı siyah */
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);

      border: 2px solid rgba(255, 255, 255, 0.18);

      /* İç çerçeve efekti */
      box-shadow:
        inset 0 0 0 3px rgba(255, 255, 255, 0.05),
        0 0 35px rgba(0, 0, 0, 0.5);
    }
  </style>
</head>

<body>
  <div class="glass-panel"></div>
</body>
</html>
