<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Siyah Camsı Panel + Magma Arkaplan</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* MAGMA KIRMIZISI ARKA PLAN */
    body {
      min-height: 100vh;
      background: radial-gradient(circle at center, #ff4b36, #8b0000);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px; /* Panel ile dış çerçeve arası boşluk */
    }

    /* CAMSI SİYAH ÜST PANEL */
    .glass-panel {
      width: 100%;
      height: 85vh;
      border-radius: 20px;

      /* CAM EFEKTİ - SİYAH CAM */
      background: rgba(0, 0, 0, 0.25);     /* siyah ama şeffaf */
      backdrop-filter: blur(22px) brightness(0.8) saturate(150%);
      -webkit-backdrop-filter: blur(22px) brightness(0.8) saturate(150%);

      border: 2px solid rgba(255, 255, 255, 0.15);

      /* Cam görünümünü güçlendiren iç ve dış gölgeler */
      box-shadow:
        inset 0 0 30px rgba(255, 255, 255, 0.08),
        0 20px 40px rgba(0, 0, 0, 0.5);
    }
  </style>
</head>

<body>
  <div class="glass-panel"></div>
</body>
</html>
