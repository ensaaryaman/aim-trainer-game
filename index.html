<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camsı Beyaz Dalgalı Panel</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    /* ARKA PLAN */
    body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle at center, #b31212, #5c0000);
        padding: 70px 120px; /* 👉 Sağ-sol boşluk artırıldı */
    }

    /* CAMSI BEYAZ PANEL */
    .glass {
        width: 100%;
        height: 85vh;

        background: rgba(255, 255, 255, 0.18); /* camsı beyaz */
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);

        border-radius: 12px;

        position: relative;
    }

    /* DALGALI PANEL ÇİZGİSİ */
    svg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
    }

</style>
</head>

<body>

<div class="glass">

    <!-- DALGALI KENAR ÇİZGİSİ (ELLE ÇİZDİĞİN ŞEKLE BENZER) -->
    <svg viewBox="0 0 100 100" preserveAspectRatio="none">
        <path d="
            M2,5 
            C10,8 30,3 50,5 
            C70,7 85,3 98,5 
            L98,95 
            C85,92 70,97 50,95 
            C30,93 15,97 2,95 
            Z" 
        fill="none" 
        stroke="black" 
        stroke-width="1.2"/>
    </svg>

</div>

</body>
</html>
