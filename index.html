<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aim Trainer Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎯 Aim Trainer Pro</h1>
        
        <div class="stats">
            <div class="stat">
                <span class="stat-value" id="score">0</span>
                <span class="stat-label">Skor</span>
            </div>
            <div class="stat">
                <span class="stat-value" id="time">30</span>
                <span class="stat-label">Süre</span>
            </div>
            <div class="stat">
                <span class="stat-value" id="accuracy">0%</span>
                <span class="stat-label">İsabet</span>
            </div>
            <div class="stat">
                <span class="stat-value" id="avgTime">0ms</span>
                <span class="stat-label">Ort. Süre</span>
            </div>
            <div class="stat">
                <span class="stat-value" id="maxCombo">0</span>
                <span class="stat-label">Max Kombo</span>
            </div>
        </div>

        <div class="game-area" id="gameArea">
            <div class="high-score-badge" id="highScoreBadge">👑 En İyi: 0</div>
            <div class="combo-display" id="comboDisplay">0x KOMBO</div>
            <div class="multiplier" id="multiplier">×1.0</div>
            <div class="combo-bar-container" id="comboBarContainer">
                <div class="combo-bar" id="comboBar"></div>
            </div>
            <div class="overlay" id="overlay">
                <h2>🎯 Aim Trainer Pro</h2>
                <p>Hedeflere mümkün olduğunca hızlı tıkla!</p>
                <p>🔥 Üst üste vuruşlar = Kombo bonusu!</p>
                <p>Oyunu başlatmak için aşağıdaki butona tıkla.</p>
            </div>
        </div>

        <div class="controls">
            <div class="select-group">
                <label for="difficulty">Zorluk:</label>
                <select id="difficulty">
                    <option value="easy">Kolay</option>
                    <option value="medium" selected>Orta</option>
                    <option value="hard">Zor</option>
                    <option value="extreme">Ekstrem</option>
                </select>
            </div>
            <div class="select-group">
                <label for="gameMode">Mod:</label>
                <select id="gameMode">
                    <option value="classic">Klasik</option>
                    <option value="moving">Hareketli</option>
                    <option value="chaos">Kaos</option>
                </select>
            </div>
            <button class="btn-start" id="startBtn" onclick="startGame()">Başlat</button>
            <button class="btn-reset" onclick="resetGame()">Sıfırla</button>
            <button class="btn-scores" onclick="showLeaderboard()">🏆 Skorlar</button>
            <button class="btn-sound" id="soundBtn" onclick="toggleSound()">🔊</button>
        </div>
    </div>

    <!-- Leaderboard Modal -->
    <div class="modal" id="leaderboardModal">
        <div class="modal-content">
            <h2>🏆 En İyi Skorlar</h2>
            <ul class="leaderboard-list" id="leaderboardList">
            </ul>
            <button class="close-modal" onclick="closeLeaderboard()">Kapat</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
