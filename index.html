<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mavi Camsı Hero + Üst Menü</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
      overflow: hidden;

      /* Açık mavi ana arka plan */
      background: linear-gradient(135deg, #dff3ff, #c7e3ff);
    }

    /* Blur arka plan bulutları — tamamı mavi tonlarda */
    body::before {
      content: "";
      position: fixed;
      inset: -120px;
      background:
        radial-gradient(circle at 20% 20%, #b0dcff 0%, transparent 55%),
        radial-gradient(circle at 75% 15%, #d2eaff 0%, transparent 55%),
        radial-gradient(circle at 30% 85%, #a5d4ff 0%, transparent 60%),
        radial-gradient(circle at 85% 80%, #cfe6ff 0%, transparent 55%);
      filter: blur(45px);
      z-index: -1;
    }

    /* Öndeki camsı panel */
    .hero-card {
      width: min(1120px, 90%);
      height: 520px;

      background: rgba(255, 255, 255, 0.18);
      border-radius: 32px;
      border: 1px solid rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(22px) saturate(160%);
      -webkit-backdrop-filter: blur(22px) saturate(160%);

      box-shadow:
        0 25px 60px rgba(0, 50, 100, 0.15),
        inset 0 0 30px rgba(255, 255, 255, 0.18);

      padding: 24px 40px; /* menü için iç boşluk */
      display: flex;
      flex-direction: column;
    }

    /* ÜST MENÜ (NAVBAR) */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;

      /* nav da hafif camsı olsun */
      background: rgba(255, 255, 255, 0.22);
      border-radius: 999px;
      padding: 10px 20px;
      border: 1px solid rgba(255, 255, 255, 0.55);
      box-shadow: 0 10px 25px rgba(0, 60, 120, 0.12);
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #13527e;
    }

    .nav-logo-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(135deg, #46a7ff, #7cd3ff);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 18px;
      font-size: 0.9rem;
    }

    .nav-links a {
      text-decoration: none;
      color: #25597f;
      opacity: 0.9;
      padding: 6px 10px;
      border-radius: 999px;
      transition: background 0.2s ease, opacity 0.2s ease, transform 0.15s ease;
    }

    .nav-links a:hover {
      background: rgba(255, 255, 255, 0.7);
      opacity: 1;
      transform: translateY(-1px);
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-btn-outline {
      border-radius: 999px;
      border: 1px solid rgba(37, 89, 127, 0.25);
      background: rgba(255, 255, 255, 0.4);
      padding: 8px 16px;
      font-size: 0.85rem;
      color: #25597f;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
    }

    .nav-btn-primary {
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #3f8cff, #5fd0ff);
      padding: 8px 18px;
      font-size: 0.85rem;
      color: white;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 12px 25px rgba(0, 90, 170, 0.4);
      transition: transform 0.15s ease, box-shadow 0.2s ease;
    }

    .nav-btn-outline:hover,
    .nav-btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 30px rgba(0, 80, 150, 0.4);
    }

    /* Panelin alt kısmı şu an boş, ileride içerik eklemek için */
    .hero-content {
      flex: 1;
      /* şimdilik boş kalsın */
    }

    @media (max-width: 768px) {
      .hero-card {
        padding: 16px 18px;
      }
      .nav {
        gap: 12px;
      }
      .nav-links {
        display: none; /* mobilde linkleri gizle, sadece logo + buton kalsın */
      }
    }
  </style>
</head>
<body>
  <div class="hero-card">
    <!-- ÜST MENÜ -->
    <header class="nav">
      <div class="nav-left">
        <div class="nav-logo-dot"></div>
        <span>MyBrand</span>
      </div>

      <nav class="nav-links">
        <a href="#">Solutions</a>
        <a href="#">Products</a>
        <a href="#">Clients</a>
        <a href="#">Resources</a>
      </nav>

      <div class="nav-right">
        <button class="nav-btn-outline">Login</button>
        <button class="nav-btn-primary">Sign Up</button>
      </div>
    </header>

    <!-- Şimdilik boş bırakılan ana içerik alanı -->
    <div class="hero-content"></div>
  </div>
</body>
</html>
